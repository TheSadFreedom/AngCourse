@if (isEditMode()) {
<app-profile-form (saved)="onProfileSaved($event)" (close)="closeEdit()">
</app-profile-form>
}
@else {
<app-profile-preview [profile]="profile()" (edit)="openEdit()" />
<div class="MainProfileContainer">
  <div class="left">
    <app-post-feed />
  </div>

  <div class="right">
    <app-profile-subscribers/>
    <profile-description/>
  </div>
</div>



}
