@if (subscribers$ | async; as data) {

  <div class="subCount mb16">
    <h2 class="subLabel">Подписчики - {{ data.total }}</h2>
  </div>

  @for (user of data.items; track user.id) {
    <img class="avatar" [src]="'https://icherniakov.ru/yt-course/' + user.avatarUrl" [alt]="user.username" />
  }
}
