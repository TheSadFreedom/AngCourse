@if (profile) {
<div class="profilePreview_Container">
  <avatar-component [profileId]="profile.id" [width]="140" [height]="140" />
  <div class="rCont">

    <h2>
      {{ profile.firstName }} {{ profile.lastName }}
    </h2>

    <p class="username">
      @{{ profile.username }}
    </p>
  </div>

</div>

<button class="profileSettingsBtn btn" (click)="onEdit()">
  редактировать
</button>

}
